name: Deploy docs to GitHub Pages

# Builds the Sphinx documentation and publishes it to GitHub Pages at
# https://halcyon-project.github.io/halcyon-docs
#
# One-time manual setup (in the repository UI):
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"

on:
  # Rebuild and deploy on every push to the default branch.
  push:
    branches: [master]
  # Allow running the workflow manually from the Actions tab.
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment. Do not cancel an in-progress run so
# that a publish always finishes cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build HTML with Sphinx
        run: sphinx-build -b html . build

      - name: Disable Jekyll (serve _static / _images dirs verbatim)
        run: touch build/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
